abstract: |-
  A democracy and a dictatorship are not racing on the same clock. A new prime minister inherits a damaged system, needs years for a reform to mature, and is often removed before any of it shows, while an entrenched ruler holds position through fear and accumulates across decades. The intuitive fix, a strong leader who stays long enough to finish the job, is the wrong one, because it builds the vehicle the next illiberal government will drive. This paper prices the right one. It treats a democracy's strategic capacity, the expertise and institutional memory and half-built reforms that let a state act on a long horizon, as a stock that accumulates continuously and is knocked down at each change of government, a piecewise-deterministic Markov process with a closed-form long-run mean, K* = u / (delta + lambda·chi). The disadvantage the model isolates is not the turnover rate lambda but the product lambda·chi, turnover multiplied by the fraction chi of capacity lost per turnover, a quantity the paper calls the reset tax. Four results follow from the one process. At fixed democratic turnover, cutting reset severity from chi = 0.8 to chi = 0.1 lifts a democracy from 0.22 to 0.73 of an autocracy's long-run capacity, closing about 90 percent of the excess gap and removing most of its volatility, with no change to how often leaders are replaced. The same cut more than triples the reform horizon a government can finance, from 5.5 to 18.5 years, so a 15-year mission that would need a 42.5-fold payoff to survive a high-reset democracy needs only a 3.1-fold payoff under a low-reset one. Because institutions build slowly through coordinated entry and break fast through decentralized exit, electoral alternation is not self-correcting: when destruction outpaces repair, even perfect alternation drifts to breakdown, a model echo of the finding that four in five democracies that begin to autocratize do not recover, and the two cures, faster repair and earlier resistance, are both ways of lowering the reset tax. And to match an autocrat's continuity by entrenchment a democracy would have to keep its leaders for 32 years, longer than the dictator it fears, whereas the reset route keeps 4-year leaders and still buys 73 percent of autocratic continuity at 5 times the removability. The construct prices an incentive structure; it measures no country, it predicts no collapse, and it holds throughout that leaders must stay genuinely removable. Continuity belongs in the architecture of the state, not in the body of a ruler. Ships a runnable simulation whose output carries every modelled number.
